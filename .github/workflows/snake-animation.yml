name: Snake contribution animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: SmokeyBear10
          outputs: |
            snk/github-contribution-grid-snake.svg
            snk/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add snk
          git diff --cached --quiet || git commit -m "chore: update snake animation"
          git push
