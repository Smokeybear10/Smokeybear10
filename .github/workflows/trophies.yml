name: GitHub Profile Trophies

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate trophy SVG
        uses: ryo-ma/github-profile-trophy@b29d2e4197ee959500bdc90a041f7f8f99690db7
        with:
          username: ${{ github.repository_owner }}
          output_path: profile-trophies/trophy.svg
          theme: dracula
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-trophies/trophy.svg
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update profile trophies"
            git push
          fi
